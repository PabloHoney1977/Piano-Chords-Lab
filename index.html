<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Piano Chords Lab</title>
  <meta name="description" content="Piano chords, scales & theory — an interactive keyboard reference." />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b0b14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    /* Dark theme (default) */
    :root{
      --bg:#0b0b14; --bg2:#15151f; --bg3:#1d1d2b;
      --txt:#f5f5fa; --hint:#9a9ab0; --border:#2a2a3a;
      --gold:#FFD43B; --accent:#74C0FC;
      --root:#FF6B6B; --tone:#4ECDC4; --bass:#FFD43B; --dot-lbl:#07070f;
      --white-key:#f3f3fa; --white-key-lbl:#3a3a4a; --black-key:#1a1a24;
    }
    /* Light theme */
    :root[data-theme="light"]{
      --bg:#f4f4f8; --bg2:#ffffff; --bg3:#ececf3;
      --txt:#16161e; --hint:#5a5a6a; --border:#d8d8e2;
      --gold:#C79A00; --accent:#2C7BE5;
      --root:#E03131; --tone:#0CA678; --bass:#C79A00; --dot-lbl:#fff;
      --white-key:#ffffff; --white-key-lbl:#3a3a4a; --black-key:#23232e;
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    html,body{margin:0; padding:0;}
    body{
      background:var(--bg); color:var(--txt);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    #root{max-width:720px; margin:0 auto; padding:0 14px env(safe-area-inset-bottom);}
    button{font-family:inherit;}
  </style>
  <!-- PostHog placeholder — no-ops until the real key replaces __POSTHOG_KEY__ -->
  <script>window.__POSTHOG_KEY__='__POSTHOG_KEY__';</script>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
