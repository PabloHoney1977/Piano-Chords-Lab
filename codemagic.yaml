# Codemagic CI — builds the Capacitor iOS app and ships to TestFlight.
# Mirrors the Jazz Guitar Lab pipeline. The native ios/ project is generated in CI
# (`npx cap add ios`) so it doesn't need to live in the repo.
#
# Before the first run, configure in the Codemagic UI:
#   • App Store Connect API key integration named `CodemagicAppStoreKey`
#   • Environment group `revenuecat` with var REVENUECAT_IOS_KEY  (RevenueCat iOS public SDK key)
#   • Environment group `posthog`    with var POSTHOG_KEY         (optional analytics key)
#   • Set BUNDLE_ID / APP_STORE_APPLE_ID below to match the App Store Connect record.
workflows:
  ios-testflight:
    name: Piano Chords Lab — iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CodemagicAppStoreKey
    environment:
      groups:
        - revenuecat   # REVENUECAT_IOS_KEY
        - posthog      # POSTHOG_KEY (optional)
      vars:
        BUNDLE_ID: "com.pianochordslab.app"
        APP_STORE_APPLE_ID: 0000000000          # numeric Apple ID of the app record
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Assemble web assets (www/)
        script: npm run build
      - name: Inject API keys into the web build
        script: |
          set -e
          if [ -n "$REVENUECAT_IOS_KEY" ]; then
            sed -i '' "s/__REVENUECAT_KEY__/$REVENUECAT_IOS_KEY/g" www/index.html
          else
            echo "⚠️  REVENUECAT_IOS_KEY not set — IAP will be inert in this build."
          fi
          if [ -n "$POSTHOG_KEY" ]; then
            sed -i '' "s/__POSTHOG_KEY__/$POSTHOG_KEY/g" www/index.html
          fi
      - name: Add & sync Capacitor iOS platform
        script: |
          set -e
          [ -d ios ] || npx cap add ios
          npx cap sync ios
      - name: Generate app icons & splash
        script: npx @capacitor/assets generate --ios
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          set -e
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          cd ios/App
          agvtool new-version -all $(($LATEST + 1))
      - name: Build IPA
        script: |
          set -e
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
